{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="{% static 'css/Login.css' %}">
</head>

<body>
    <div class="signUpContainer">
        <h1>Login</h1>
        <span style="color: rgb(100, 17, 233);font-size: large;">{{error_msg}}</span>
        <form onsubmit="return validatePassword()" action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <div>
                <label for="email">Email:</label>
                <input class="input" type="email" name="email" id="email" placeholder="Enter your Email id" required>
            </div>
            {% comment %} <div>
                <label for="users">Choose Role:</label>
                <select class="input" name="User" id="users">
                    <option value="As a Admin user">Admin</option>
                    <option selected value="As a guist user">Guest</option>
                    <option value="As  a I/O user">I/O</option>
                </select>
            </div> {% endcomment %}
            <div>
                <label for="password">Password:</label>
                <input class="input" type="password" name="password" id="password" required>
            </div>
            <button class="submit" type="submit">submit</button>

            <!-- <button class="submit"   onclick="validatePassword()" ><a  href="Admin.html">submit</a></button> -->

            <!-- <div><input class="submit" type="submit" value="Submit" src="Admin.html"></div> -->
            <div>
                <p>Not yet registered <a href="{% url 'signup' %}">Sign Up</a></p>

            </div>
        </form>

    </div>
</body>
<script src="{% static 'js/Login.js' %}"></script>

</html>
